<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deck · Barateam Hub</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20260305c"></script>

  <style>
    :root{
      --bg:#0b1220;
      --card: rgba(255,255,255,.94);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color:#0f172a;
    }
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(1200px 800px at 10% 10%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(900px 650px at 90% 20%, rgba(6,182,212,.28), transparent 60%),
        linear-gradient(180deg, rgba(11,18,32,.78), rgba(11,18,32,.78)),
        url("bg.png");
      background-size: cover;
      background-position: center;
      z-index:-1;
    }
    .topbar{
      position: sticky;
      top:0;
      z-index:10;
      backdrop-filter: blur(14px);
      background: rgba(15, 23, 42, .55);
      border-bottom: 1px solid rgba(255,255,255,.12);
      padding: 12px 14px;
    }
    .bar{ max-width:1100px; margin:0 auto; display:flex; align-items:center; gap:10px; }
    .btn{
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.12);
      color:#fff;
      padding:9px 12px;
      border-radius:12px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      font: inherit;
    }
    .wrap{ max-width:1100px; margin:16px auto 28px; padding:0 14px; }
    .card{
      background: var(--card);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .title{ margin:0 0 10px; font-size:26px; font-weight:1000; }
    .headRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .headRow .title{ margin:0; }
    .meta{ color:#475569; font-size:13px; display:flex; gap:12px; flex-wrap:wrap; }
    .grid{ display:grid; grid-template-columns:1fr; gap:14px; margin-top:14px; }
    @media (min-width: 980px){ .grid{ grid-template-columns: 1fr 1fr; } }
    .panel{
      border: 1px solid rgba(15,23,42,.10);
      border-radius: 16px;
      background: rgba(255,255,255,.72);
      padding: 12px;
    }
    .leaderPanel{
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(135deg, rgba(255,255,255,.90), rgba(255,255,255,.82));
    }
    .leaderPanel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(108deg, rgba(255,255,255,.95) 0%, rgba(255,255,255,.88) 45%, rgba(255,255,255,.72) 100%),
        var(--leader-bg-image, none);
      background-size: cover, cover;
      background-position-y: -165px;
      z-index:-1;
    }
    .leaderPanel::after{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(320px 160px at 15% 15%, rgba(59,130,246,.15), transparent 72%);
      z-index:-1;
      pointer-events:none;
    }
    .panel h3{ margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:#334155; }
    .panelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }
    .panelHead h3{ margin:0; }
    .btnTiny{
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1;
    }
    .leaderRow{ display:flex; align-items:center; gap:12px; }
    .leaderImg{
      width: calc(96px * 0.72);
      height: 96px;
      aspect-ratio: 2 / 3;
      border-radius: 10px;
      object-fit: contain;
      border: 1px solid rgba(15,23,42,.12);
      background: #fff;
    }
    .leaderName{ font-weight:900; font-size:16px; }
    .deckImg{
      width:100%;
      max-height:520px;
      object-fit:contain;
      border:1px solid rgba(15,23,42,.10);
      border-radius: 14px;
      background:#fff;
    }
    pre{
      margin:0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size:13px;
      line-height:1.45;
      color:#0f172a;
    }
    .muted{ color:#64748b; font-size:13px; }
    .msg{
      margin-top:12px;
      border-radius:12px;
      padding:10px 12px;
      border:1px solid rgba(239,68,68,.35);
      background: rgba(239,68,68,.10);
      color:#991b1b;
      display:none;
      white-space: pre-line;
    }
    .msg.ok{
      border-color: rgba(34,197,94,.35);
      background: rgba(34,197,94,.10);
      color:#166534;
      display:block;
    }
    .actionsRow{
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .editPanel{ margin-top:12px; display:none; }
    .editPanel.open{ display:block; }
    .editGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .editGrid label{
      display:block;
      font-size:12px;
      font-weight:900;
      color:#334155;
      margin-bottom:6px;
      letter-spacing:.4px;
    }
    .editGrid input, .editGrid textarea, .editGrid select{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.18);
      padding:10px 12px;
      font:inherit;
      box-sizing:border-box;
      background:#fff;
    }
    .editGrid textarea{ min-height:90px; resize:vertical; }
    .editActions{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
    .btnLight{
      border:1px solid rgba(15,23,42,.16);
      background: rgba(15,23,42,.06);
      color:#0f172a;
    }
    .btnDanger{
      border: 1px solid rgba(185,28,28,.34);
      background: rgba(239,68,68,.12);
      color: #7f1d1d;
    }
    .btnDanger:hover{
      background: rgba(239,68,68,.20);
      border-color: rgba(185,28,28,.48);
    }

    .socialCard{ margin-top:14px; }
    .socialRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .iconBtn{
      border: 1px solid rgba(15,23,42,.12);
      background: rgba(255,255,255,.78);
      color:#0f172a;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 13px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .iconBtn.active{
      background: rgba(234,179,8,.22);
      border-color: rgba(234,179,8,.45);
    }
    .likeWrap{ position:relative; display:inline-flex; align-items:center; }
    .hoverUsers{
      position:absolute;
      left:0;
      top: calc(100% + 6px);
      width: 230px;
      max-height: 200px;
      overflow:auto;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.14);
      background: rgba(255,255,255,.98);
      box-shadow: 0 16px 32px rgba(0,0,0,.20);
      padding: 8px;
      display:none;
      z-index: 12;
    }
    .likeWrap:hover .hoverUsers{ display:block; }
    .hoverUsers .u{
      font-size: 12px;
      color:#0f172a;
      line-height: 1.35;
      padding: 3px 0;
      border-top: 1px solid rgba(15,23,42,.08);
    }
    .hoverUsers .u:first-child{ border-top:0; }

    .commentsPanel{
      margin-top:10px;
      border-top: 1px solid rgba(15,23,42,.10);
      padding-top:10px;
      display:none;
    }
    .commentsPanel.open{ display:block; }
    .commentComposer{
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom:8px;
    }
    .commentComposer textarea{
      width:100%;
      min-height:86px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.18);
      padding: 10px 12px;
      box-sizing: border-box;
      resize: vertical;
      font: inherit;
    }
    .commentList{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:8px;
    }
    .commentItem{
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.10);
      background: rgba(255,255,255,.72);
      padding: 8px 10px;
    }
    .commentHead{
      font-size: 12px;
      color:#64748b;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:4px;
    }
    .commentUser{ font-weight: 900; color:#0f172a; }
    .userLink{
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(15,23,42,.28);
      text-underline-offset: 2px;
    }
    .userLink:hover{
      text-decoration-color: rgba(15,23,42,.60);
    }
    .commentBody{
      margin:0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      color:#334155;
      line-height: 1.4;
    }

    @media (max-width: 760px){
      .topbar{ padding: 10px; }
      .bar{ gap:8px; }
      .wrap{ padding: 0 10px; margin: 12px auto 22px; }
      .title{ font-size: 22px; }
      .headRow{ align-items:center; }
      .card{ padding: 12px; border-radius: 16px; }
      .panel{ border-radius: 12px; }
      .leaderPanel::before{
        background-position-y: -66px;
      }
      .leaderImg{
        width: calc(84px * 0.72);
        height: 84px;
        border-radius: 9px;
      }
      .hoverUsers{ width: min(220px, calc(100vw - 40px)); }
      .socialRow .iconBtn{ flex: 1 1 auto; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="bar">
      <a class="btn" href="decks.html">Volver a decks</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="headRow">
        <h1 class="title" id="deckName">Deck</h1>
        <button class="btn btnLight" id="btnCopyDeckLink" type="button">Copiar enlace</button>
      </div>
      <div class="meta">
        <span id="deckAuthor">Autor: -</span>
        <span id="deckCreated">Creado: -</span>
      </div>
      <div class="actionsRow">
        <button class="btn btnLight" id="btnEditDeck" type="button" style="display:none;">Editar deck</button>
      </div>

      <div class="grid">
        <div class="panel leaderPanel" id="leaderPanel">
          <h3>Lider</h3>
          <div class="leaderRow">
            <img id="leaderImage" class="leaderImg" alt="Lider" />
            <div>
              <div class="leaderName" id="leaderName">-</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <h3>Descripcion</h3>
          <pre id="description">-</pre>
        </div>

        <div class="panel" id="deckImagePanel">
          <h3>Imagen del deck</h3>
          <img id="deckImage" class="deckImg" alt="Imagen del deck" />
          <div class="muted" id="deckImageEmpty" style="display:none; margin-top:8px;">Este deck no tiene imagen.</div>
        </div>

        <div class="panel">
          <div class="panelHead">
            <h3>Sim paste</h3>
            <button class="btn btnLight btnTiny" id="btnCopySimPaste" type="button">Copiar lista</button>
          </div>
          <pre id="simPaste">-</pre>
        </div>
      </div>
      <div class="panel editPanel" id="editPanel">
        <h3>Editar deck</h3>
        <div class="editGrid">
          <div>
            <label for="editName">Nombre</label>
            <input id="editName" type="text" />
          </div>
          <div>
            <label for="editLeader">Lider</label>
            <select id="editLeader">
              <option value="">(Selecciona lider)</option>
            </select>
          </div>
          <div>
            <label for="editImageUrl">Deck image URL</label>
            <input id="editImageUrl" type="text" />
          </div>
          <div>
            <label for="editImageFile">Subir imagen de deck</label>
            <input id="editImageFile" type="file" accept="image/*" />
          </div>
          <div>
            <label for="editDescription">Descripcion</label>
            <textarea id="editDescription"></textarea>
          </div>
          <div>
            <label for="editSimPaste">Sim paste</label>
            <textarea id="editSimPaste"></textarea>
          </div>
        </div>
        <div class="editActions">
          <button class="btn btnDanger" id="btnDeleteDeck" type="button">Eliminar deck</button>
          <button class="btn btnLight" id="btnCancelEditDeck" type="button">Cancelar</button>
          <button class="btn btnLight" id="btnSaveEditDeck" type="button">Guardar cambios</button>
        </div>
      </div>

      <div class="card socialCard">
        <div class="socialRow">
          <div class="likeWrap">
            <button class="iconBtn" id="btnLike" type="button">&#128077; 0</button>
            <div class="hoverUsers" id="likeUsersHover"></div>
          </div>
          <button class="iconBtn" id="btnToggleComments" type="button">Comentarios (0)</button>
        </div>

        <div class="commentsPanel" id="commentsPanel">
          <div class="commentComposer" id="commentComposer"></div>
          <div class="commentList" id="commentsList"></div>
        </div>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const sb = window.BarateamApp.createClient();

    const $ = window.BarateamApp.byId;

    let currentUser = null;
    let deckId = null;
    let currentDeck = null;
    let isDeckOwner = false;
    let profileCache = new Map();
    let socialState = { comments: [], likes: [], likedByMe: false };
    let editLeaders = [];
    let editLeaderByLabel = new Map();

    const escapeHtml = window.BarateamApp.escapeHtml;
    const escapeAttr = window.BarateamApp.escapeAttr;
    const showError = (text) => window.BarateamApp.showMessage("msg", text, { baseClass: "msg" });
    const formatDate = window.BarateamApp.formatDate;
    const formatDateTime = window.BarateamApp.formatDateTime;

    function setImage(el, url){
      if (url){
        el.src = url;
        el.style.display = "block";
      } else {
        el.removeAttribute("src");
        el.style.display = "none";
      }
    }

    function userLabel(userId){
      if (!userId) return "Usuario";
      if (profileCache.has(userId)) return profileCache.get(userId);
      return "usuario";
    }

    function norm(value){
      return String(value || "").trim();
    }

    function leaderLabelFromRow(row){
      const name = norm(row?.name);
      const code = norm(row?.code);
      return [name, code].filter(Boolean).join(" ").trim();
    }

    function leaderImageFromRow(row){
      return norm(row?.parallel_image_url || row?.image_url);
    }

    function resolveLeaderForDeck(leaderLabel){
      const normalized = norm(leaderLabel);
      if (!normalized) return null;
      const lower = normalized.toLowerCase();
      const direct = editLeaderByLabel.get(normalized);
      if (direct) return direct;
      return editLeaders.find((l) => (
        l.searchLabel === lower ||
        l.searchName === lower ||
        l.searchCode === lower ||
        l.searchLabel.startsWith(lower) ||
        lower.startsWith(l.searchName)
      )) || null;
    }

    function deckLeaderImage(deck){
      const byLeader = resolveLeaderForDeck(deck?.leader || "");
      const fromLeaders = norm(byLeader?.image || "");
      if (fromLeaders) return fromLeaders;
      return norm(deck?.leader_image_url);
    }

    function fillEditLeaderSelect(){
      const sel = $("editLeader");
      sel.innerHTML = '<option value="">(Selecciona lider)</option>';
      for (const l of editLeaders){
        const opt = document.createElement("option");
        opt.value = l.label;
        opt.textContent = l.label;
        sel.appendChild(opt);
      }
    }

    function ensureEditLeaderOption(label){
      const normalized = norm(label);
      if (!normalized) return;
      if (editLeaderByLabel.has(normalized)) return;
      const sel = $("editLeader");
      const opt = document.createElement("option");
      opt.value = normalized;
      opt.textContent = normalized;
      sel.appendChild(opt);
    }

    async function initEditLeaders(){
      const { data, error } = await sb
        .from("leaders")
        .select("*")
        .order("name", { ascending: true })
        .limit(500);

      if (error){
        console.warn("leaders:", error.message);
        editLeaders = [];
        editLeaderByLabel = new Map();
        fillEditLeaderSelect();
        return;
      }

      const mapped = (data || [])
        .map((row) => {
          const label = leaderLabelFromRow(row);
          if (!label) return null;
          const name = norm(row?.name);
          const code = norm(row?.code);
          return {
            label,
            image: leaderImageFromRow(row) || null,
            name,
            code,
            searchLabel: label.toLowerCase(),
            searchName: name.toLowerCase(),
            searchCode: code.toLowerCase()
          };
        })
        .filter(Boolean);

      const uniq = new Map();
      for (const l of mapped){
        if (!uniq.has(l.label)) uniq.set(l.label, l);
      }

      editLeaders = Array.from(uniq.values());
      editLeaderByLabel = new Map(editLeaders.map((l) => [l.label, l]));
      fillEditLeaderSelect();
    }

    async function uploadDeckImage(file, userId){
      if (!file) return null;

      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const safeExt = ext.replace(/[^a-z0-9]/g, "") || "jpg";
      const fileName = `${Date.now()}-${Math.random().toString(16).slice(2)}.${safeExt}`;
      const path = `${userId}/${fileName}`;

      const { error: upErr } = await sb
        .storage
        .from("deck-images")
        .upload(path, file, { upsert: false, contentType: file.type });

      if (upErr) throw upErr;
      const { data } = sb.storage.from("deck-images").getPublicUrl(path);
      return data?.publicUrl || null;
    }

    function profileHref(userId){
      if (!userId) return "";
      return `user.html?id=${encodeURIComponent(userId)}`;
    }

    function profileLink(userId, label){
      const safeLabel = label || "Usuario";
      if (!userId) return escapeHtml(safeLabel);
      return `<a class="userLink" href="${escapeAttr(profileHref(userId))}">${escapeHtml(safeLabel)}</a>`;
    }

    async function fillProfiles(userIds){
      const ids = Array.from(new Set((userIds || []).filter(Boolean)));
      const missing = ids.filter(id => !profileCache.has(id));
      if (!missing.length) return;

      const { data, error } = await sb
        .from("profiles")
        .select("id,username")
        .in("id", missing);

      if (error){
        console.warn("profiles:", error.message);
        for (const id of missing){
          if (!profileCache.has(id)) profileCache.set(id, "usuario");
        }
        return;
      }

      for (const row of (data || [])){
        const label = row.username || row.id?.slice(0, 8) || "usuario";
        profileCache.set(row.id, label);
      }
      for (const id of missing){
        if (!profileCache.has(id)) profileCache.set(id, "usuario");
      }
    }

    async function refreshSession(){
      const { data } = await sb.auth.getSession();
      currentUser = data?.session?.user || null;
    }

    function renderDeck(deck){
      $("deckName").textContent = deck.name || "Deck";
      const authorLabel = userLabel(deck.autor);
      $("deckAuthor").innerHTML = `Autor: ${profileLink(deck.autor, authorLabel)}`;
      $("deckCreated").textContent = `Creado: ${formatDate(deck.created_at)}`;

      const resolvedLeaderImage = deckLeaderImage(deck);
      $("leaderName").textContent = deck.leader || "-";
      setImage($("leaderImage"), resolvedLeaderImage || "");
      const leaderPanel = $("leaderPanel");
      if (leaderPanel){
        const bg = resolvedLeaderImage
          ? `url("${String(resolvedLeaderImage).replace(/"/g, '\\"')}")`
          : "none";
        leaderPanel.style.setProperty("--leader-bg-image", bg);
      }

      const deckImage = deck.image_url || "";
      if (deckImage){
        setImage($("deckImage"), deckImage);
        $("deckImageEmpty").style.display = "none";
      } else {
        $("deckImage").style.display = "none";
        $("deckImageEmpty").style.display = "block";
      }

      $("description").textContent = deck.description || "-";
      $("simPaste").textContent = deck.sim_paste || "-";
    }

    function computeDeckOwner(){
      isDeckOwner = !!(currentUser && currentDeck && currentDeck.autor === currentUser.id);
    }

    function renderDeckOwnerUI(){
      const btn = $("btnEditDeck");
      if (!btn) return;
      btn.style.display = isDeckOwner ? "inline-flex" : "none";
      if (!isDeckOwner){
        $("editPanel").classList.remove("open");
      }
    }

    function fillEditForm(deck){
      $("editName").value = deck?.name || "";
      ensureEditLeaderOption(deck?.leader || "");
      $("editLeader").value = deck?.leader || "";
      $("editImageUrl").value = deck?.image_url || "";
      $("editImageFile").value = "";
      $("editDescription").value = deck?.description || "";
      $("editSimPaste").value = deck?.sim_paste || "";
    }

    function openEditPanel(){
      if (!isDeckOwner || !currentDeck) return;
      fillEditForm(currentDeck);
      $("editPanel").classList.add("open");
    }

    function closeEditPanel(){
      $("editPanel").classList.remove("open");
    }

    async function saveDeckEdits(){
      if (!isDeckOwner || !currentDeck || !deckId){
        showError("No tienes permisos para editar este deck.");
        return;
      }

      try{
        const selectedLeader = norm($("editLeader").value);
        const leaderData = editLeaderByLabel.get(selectedLeader) || null;
        let nextImageUrl = norm($("editImageUrl").value) || null;
        const editFile = $("editImageFile").files?.[0] || null;
        if (editFile){
          nextImageUrl = await uploadDeckImage(editFile, currentUser.id);
        }

        const payload = {
          name: $("editName").value.trim() || null,
          leader: selectedLeader || null,
          leader_image_url: leaderData?.image || null,
          image_url: nextImageUrl,
          description: $("editDescription").value.trim() || null,
          sim_paste: $("editSimPaste").value.trim() || null
        };

        const { data, error } = await sb
          .from("decks")
          .update(payload)
          .eq("id", deckId)
          .eq("autor", currentUser.id)
          .select("id, name, created_at, autor, leader, leader_image_url, image_url, description, sim_paste")
          .maybeSingle();

        if (error){
          showError("No pude guardar los cambios: " + error.message);
          return;
        }
        if (!data){
          showError("No se pudo actualizar el deck (permisos o registro).");
          return;
        }

        currentDeck = data;
        renderDeck(currentDeck);
        closeEditPanel();
        window.BarateamApp.showMessage("msg", "Deck actualizado", { baseClass: "msg", type: "ok" });
      }catch(e){
        showError("No pude guardar los cambios: " + (e.message || "unknown"));
      }
    }
    async function deleteDeck(){
      if (!isDeckOwner || !currentDeck || !deckId || !currentUser){
        showError("No tienes permisos para eliminar este deck.");
        return;
      }

      const ok = window.confirm("¿Seguro que quieres eliminar este deck? Esta accion no se puede deshacer.");
      if (!ok) return;

      try{
        const { error } = await sb
          .from("decks")
          .delete()
          .eq("id", deckId)
          .eq("autor", currentUser.id);

        if (error){
          showError("No pude eliminar el deck: " + error.message);
          return;
        }

        window.location.href = "decks.html";
      }catch(e){
        showError("No pude eliminar el deck: " + (e.message || "unknown"));
      }
    }
async function loadDeck(){
      const params = new URLSearchParams(window.location.search);
      deckId = params.get("id");

      if (!deckId){
        showError("Falta el id del deck en la URL.");
        return false;
      }

      try{
        const { data, error } = await sb
          .from("decks")
          .select("id, name, created_at, autor, leader, leader_image_url, image_url, description, sim_paste")
          .eq("id", deckId)
          .maybeSingle();

        if (error) throw error;
        if (!data){
          showError("No se encontro el deck solicitado.");
          return false;
        }

        await fillProfiles([data.autor]);
        currentDeck = data;
        renderDeck(currentDeck);
        computeDeckOwner();
        renderDeckOwnerUI();
        return true;
      }catch(e){
        console.error(e);
        showError("Error cargando deck: " + (e.message || "unknown"));
        return false;
      }
    }

    async function loadDeckSocial(){
      if (!deckId) return;

      const [commentsRes, likesRes] = await Promise.all([
        sb.from("comments")
          .select("id,created_at,autor,body,deck")
          .eq("deck", deckId)
          .order("created_at", { ascending: false }),
        sb.from("likes")
          .select("id,created_at,autor,deck")
          .eq("deck", deckId)
      ]);

      if (commentsRes.error) console.warn("comments:", commentsRes.error.message);
      if (likesRes.error) console.warn("likes:", likesRes.error.message);

      const comments = commentsRes.data || [];
      const likes = likesRes.data || [];

      await fillProfiles([
        ...comments.map(c => c.autor),
        ...likes.map(l => l.autor)
      ]);

      socialState = {
        comments,
        likes,
        likedByMe: !!(currentUser && likes.some(l => l.autor === currentUser.id))
      };

      renderSocial();
    }

    function renderSocial(){
      const likes = socialState.likes || [];
      const comments = socialState.comments || [];

      const likeBtn = $("btnLike");
      likeBtn.innerHTML = `&#128077; ${likes.length}`;
      likeBtn.classList.toggle("active", !!socialState.likedByMe);

      const likeUsersHover = $("likeUsersHover");
      likeUsersHover.innerHTML = likes.length
        ? likes.map(l => `<div class="u">${profileLink(l.autor, userLabel(l.autor))}</div>`).join("")
        : `<div class="u">Sin likes todavia.</div>`;

      $("btnToggleComments").textContent = `Comentarios (${comments.length})`;

      const composer = $("commentComposer");
      if (currentUser){
        composer.innerHTML = `
          <textarea id="commentInput" placeholder="Escribe un comentario..."></textarea>
          <div><button class="iconBtn" id="btnSendComment" type="button">Comentar</button></div>
        `;
        $("btnSendComment").addEventListener("click", submitDeckComment);
      } else {
        composer.innerHTML = `<div class="muted">Inicia sesion para comentar.</div>`;
      }

      const list = $("commentsList");
      if (!comments.length){
        list.innerHTML = `<div class="muted">No hay comentarios.</div>`;
        return;
      }

      list.innerHTML = comments.map(c => `
        <div class="commentItem">
          <div class="commentHead">
            <span class="commentUser">${profileLink(c.autor, userLabel(c.autor))}</span>
            <span>${escapeHtml(formatDateTime(c.created_at))}</span>
          </div>
          <p class="commentBody">${escapeHtml(c.body || "")}</p>
        </div>
      `).join("");
    }

    async function toggleDeckLike(){
      if (!currentUser){
        showError("Inicia sesion para dar like.");
        return;
      }
      if (!deckId) return;

      const { data: existing, error: exErr } = await sb
        .from("likes")
        .select("id")
        .eq("deck", deckId)
        .eq("autor", currentUser.id)
        .limit(1);

      if (exErr){
        showError("Error en likes: " + exErr.message);
        return;
      }

      if (existing && existing.length){
        const { error } = await sb
          .from("likes")
          .delete()
          .eq("deck", deckId)
          .eq("autor", currentUser.id);
        if (error) return showError("No pude quitar el like: " + error.message);
      } else {
        const { error } = await sb.from("likes").insert({ autor: currentUser.id, deck: deckId });
        if (error) return showError("No pude dar like: " + error.message);
      }

      await loadDeckSocial();
    }

    async function submitDeckComment(){
      if (!currentUser){
        showError("Inicia sesion para comentar.");
        return;
      }
      if (!deckId) return;

      const input = $("commentInput");
      const body = input?.value?.trim() || "";
      if (!body) return showError("Escribe un comentario.");

      const { error } = await sb.from("comments").insert({
        autor: currentUser.id,
        deck: deckId,
        body
      });

      if (error) return showError("No pude guardar el comentario: " + error.message);

      input.value = "";
      await loadDeckSocial();
    }

    async function copyDeckLink(){
      try{
        await navigator.clipboard.writeText(window.location.href);
        window.BarateamApp.showMessage("msg", "Enlace copiado", { baseClass: "msg", type: "ok" });
      }catch(_e){
        showError("No pude copiar el enlace.");
      }
    }

    async function copySimPaste(){
      const text = String($("simPaste")?.textContent || "").trim();
      if (!text || text === "-"){
        showError("No hay lista para copiar.");
        return;
      }
      try{
        await navigator.clipboard.writeText(text);
        window.BarateamApp.showMessage("msg", "Lista copiada", { baseClass: "msg", type: "ok" });
      }catch(_e){
        showError("No pude copiar la lista.");
      }
    }

    $("btnLike").addEventListener("click", toggleDeckLike);
    $("btnToggleComments").addEventListener("click", () => {
      $("commentsPanel").classList.toggle("open");
    });
    $("btnEditDeck").addEventListener("click", openEditPanel);
    $("btnCopyDeckLink").addEventListener("click", copyDeckLink);
    $("btnCopySimPaste").addEventListener("click", copySimPaste);
    $("btnCancelEditDeck").addEventListener("click", closeEditPanel);
    $("btnSaveEditDeck").addEventListener("click", saveDeckEdits);
    $("btnDeleteDeck").addEventListener("click", deleteDeck);

    (async function init(){
      await refreshSession();
      await initEditLeaders();
      const ok = await loadDeck();
      if (!ok) return;
      await loadDeckSocial();

      sb.auth.onAuthStateChange(async (_event, session) => {
        currentUser = session?.user || null;
        computeDeckOwner();
        renderDeckOwnerUI();
        await loadDeckSocial();
      });
    })();
  </script>
</body>
</html>
