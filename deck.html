<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deck · Barateam Hub</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="app.css?v=20260306a" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20260305c"></script>

  <style>
    :root{
      --bg:#0b1220;
      --card: rgba(255,255,255,.94);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color:#0f172a;
    }
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background:
        radial-gradient(1200px 800px at 10% 10%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(900px 650px at 90% 20%, rgba(6,182,212,.28), transparent 60%),
        linear-gradient(180deg, rgba(11,18,32,.78), rgba(11,18,32,.78)),
        url("bg.png");
      background-size: cover;
      background-position: center;
      z-index:-1;
    }
    .wrap{ max-width:1280px; margin:16px auto 28px; padding:0 14px; }
    .card{
      background: var(--card);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .title{ margin:0 0 10px; font-size:26px; font-weight:1000; }
    .headRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .headRow .title{ margin:0; }
    .headActions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }
    .meta{ color:#475569; font-size:13px; display:flex; gap:12px; flex-wrap:wrap; }
    .grid{ display:grid; grid-template-columns:1fr; gap:14px; margin-top:14px; }
    @media (min-width: 980px){ .grid{ grid-template-columns: 1fr 1fr; } }
    .panel{
      border: 1px solid rgba(15,23,42,.10);
      border-radius: 16px;
      background: rgba(255,255,255,.72);
      padding: 12px;
    }
    .leaderPanel{
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(135deg, rgba(255,255,255,.90), rgba(255,255,255,.82));
    }
    .leaderPanel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(108deg, rgba(255,255,255,.95) 0%, rgba(255,255,255,.88) 45%, rgba(255,255,255,.72) 100%),
        var(--leader-bg-image, none);
      background-size: cover, cover;
      background-position-y: -165px;
      z-index:-1;
    }
    .leaderPanel::after{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(320px 160px at 15% 15%, rgba(59,130,246,.15), transparent 72%);
      z-index:-1;
      pointer-events:none;
    }
    .panel h3{ margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:#334155; }
    .panelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }
    .panelHead h3{ margin:0; }
    .btnTiny{
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1;
    }
    .copyIconBtn{
      appearance:none;
      border:1px solid rgba(15,23,42,.16);
      border-radius:999px;
      background:rgba(15,23,42,.06);
      color:#0f172a;
      width:36px;
      height:36px;
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:background .14s ease, border-color .14s ease, transform .14s ease, color .14s ease;
    }
    .copyIconBtn svg{
      width:16px;
      height:16px;
      display:block;
    }
    .copyIconBtn:hover{
      background:rgba(15,23,42,.10);
      border-color:rgba(15,23,42,.26);
    }
    .copyIconBtn.shareCopyBtn{
      border-color:rgba(37,99,235,.20);
      background:rgba(37,99,235,.06);
      color:#1d4ed8;
    }
    .copyIconBtn.shareCopyBtn:hover{
      background:rgba(37,99,235,.12);
      border-color:rgba(37,99,235,.30);
    }
    .copyIconBtn.isCopied{
      background:rgba(16,185,129,.12);
      border-color:rgba(16,185,129,.30);
      color:#047857;
    }
    .leaderRow{ display:flex; align-items:center; gap:12px; }
    .leaderImg{
      width: calc(96px * 0.72);
      height: 96px;
      aspect-ratio: 2 / 3;
      border-radius: 10px;
      object-fit: contain;
      border: 1px solid rgba(15,23,42,.12);
      background: #fff;
    }
    .leaderName{ font-weight:900; font-size:16px; }
    .deckImg{
      width:100%;
      max-height:520px;
      object-fit:contain;
      border:1px solid rgba(15,23,42,.10);
      border-radius: 14px;
      background:#fff;
    }
    pre{
      margin:0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size:13px;
      line-height:1.45;
      color:#0f172a;
    }
    .srOnly{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0, 0, 0, 0);
      white-space:pre;
      border:0;
    }
    .simPasteCards{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:flex-start;
      min-height:24px;
    }
    .simCard{
      width:74px;
      border-radius:3px;
      overflow:visible;
      position:relative;
      flex:0 0 auto;
      transition:transform .14s ease;
    }
    .simCard img{
      width:100%;
      height:auto;
      display:block;
      border-radius:inherit;
      box-shadow:0 10px 24px rgba(2,6,23,.18);
      background:#fff;
    }
    .simCardFallback{
      width:100%;
      aspect-ratio:2 / 3;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px;
      color:#0f172a;
      font-size:10px;
      font-weight:1000;
      word-break:break-word;
      border-radius:inherit;
      border:1px solid rgba(15,23,42,.10);
      background:linear-gradient(180deg, rgba(248,250,252,.98), rgba(226,232,240,.94));
      box-shadow:0 10px 24px rgba(2,6,23,.10);
    }
    .simCardBadge{
      position:absolute;
      left:4px;
      right:4px;
      bottom:4px;
      font-size:10px;
      font-weight:1000;
      color:#fff;
      background:rgba(15,23,42,.86);
      border-radius:6px;
      padding:2px 4px;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .cardZoom{
      cursor:zoom-in;
    }
    .cardZoom:hover{
      transform:translateY(-2px) scale(1.03);
      z-index:2;
    }
    .cardZoom img{
      background:none;
    }
    .cardPreview{
      position:fixed;
      left:0;
      top:0;
      transform:translate3d(-9999px,-9999px,0);
      opacity:0;
      pointer-events:none;
      z-index:250000;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(2,6,23,.96);
      box-shadow:0 20px 42px rgba(2,6,23,.55);
      padding:8px;
      transition:opacity .12s ease;
    }
    .cardPreview img{
      width:220px;
      height:auto;
      max-height:320px;
      object-fit:contain;
      display:block;
      border-radius:10px;
      background:rgba(255,255,255,.04);
    }
    .simPasteInlineText{
      width:100%;
    }
    .muted{ color:#64748b; font-size:13px; }
    .msg{
      margin-top:12px;
      border-radius:12px;
      padding:10px 12px;
      border:1px solid rgba(239,68,68,.35);
      background: rgba(239,68,68,.10);
      color:#991b1b;
      display:none;
      white-space: pre-line;
    }
    .msg.ok{
      border-color: rgba(34,197,94,.35);
      background: rgba(34,197,94,.10);
      color:#166534;
      display:block;
    }
    .actionsRow{
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .editPanel{ margin-top:12px; display:none; }
    .editPanel.open{ display:block; }
    .editGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .editGrid label{
      display:block;
      font-size:12px;
      font-weight:900;
      color:#334155;
      margin-bottom:6px;
      letter-spacing:.4px;
    }
    .editGrid input, .editGrid textarea, .editGrid select{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.18);
      padding:10px 12px;
      font:inherit;
      box-sizing:border-box;
      background:#fff;
    }
    .editGrid textarea{ min-height:90px; resize:vertical; }
    .editActions{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
    .btnLight{
      border:1px solid rgba(15,23,42,.16);
      background: rgba(15,23,42,.06);
      color:#0f172a;
    }
    .btnDanger{
      border: 1px solid rgba(185,28,28,.34);
      background: rgba(239,68,68,.12);
      color: #7f1d1d;
    }
    .btnDanger:hover{
      background: rgba(239,68,68,.20);
      border-color: rgba(185,28,28,.48);
    }

    .socialCard{ margin-top:14px; }
    .socialRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .iconBtn{
      border: 1px solid rgba(15,23,42,.12);
      background: rgba(255,255,255,.78);
      color:#0f172a;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 13px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .iconBtn.active{
      background: rgba(234,179,8,.22);
      border-color: rgba(234,179,8,.45);
    }
    .likeWrap{ position:relative; display:inline-flex; align-items:center; }
    .hoverUsers{
      position:absolute;
      left:0;
      top: calc(100% + 6px);
      width: 230px;
      max-height: 200px;
      overflow:auto;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.14);
      background: rgba(255,255,255,.98);
      box-shadow: 0 16px 32px rgba(0,0,0,.20);
      padding: 8px;
      display:none;
      z-index: 12;
    }
    .likeWrap:hover .hoverUsers{ display:block; }
    .hoverUsers .u{
      font-size: 12px;
      color:#0f172a;
      line-height: 1.35;
      padding: 3px 0;
      border-top: 1px solid rgba(15,23,42,.08);
    }
    .hoverUsers .u:first-child{ border-top:0; }
    @media (hover: none), (pointer: coarse){
      .hoverUsers,
      .likeWrap:hover .hoverUsers{
        display:none !important;
      }
    }

    .commentsPanel{
      margin-top:10px;
      border-top: 1px solid rgba(15,23,42,.10);
      padding-top:10px;
      display:none;
    }
    .commentsPanel.open{ display:block; }
    .commentComposer{
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom:8px;
    }
    .commentComposer textarea{
      width:100%;
      min-height:86px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.18);
      padding: 10px 12px;
      box-sizing: border-box;
      resize: vertical;
      font: inherit;
    }
    .commentList{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:8px;
    }
    .commentItem{
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.10);
      background: rgba(255,255,255,.72);
      padding: 8px 10px;
    }
    .commentHead{
      font-size: 12px;
      color:#64748b;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:4px;
    }
    .commentUser{ font-weight: 900; color:#0f172a; }
    .userLink{
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(15,23,42,.28);
      text-underline-offset: 2px;
    }
    .userLink:hover{
      text-decoration-color: rgba(15,23,42,.60);
    }
    .commentBody{
      margin:0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      color:#334155;
      line-height: 1.4;
    }
    .commentThread{
      display:grid;
      gap:8px;
    }
    .commentActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .commentActionBtn{
      border:0;
      background:none;
      padding:0;
      font: inherit;
      font-size:12px;
      font-weight:800;
      color:#0f172a;
      cursor:pointer;
      opacity:.78;
    }
    .commentActionBtn:hover{ opacity:1; }
    .commentReplies{
      display:none;
      margin-left:18px;
      padding-left:12px;
      border-left: 2px solid rgba(15,23,42,.12);
    }
    .commentReplies.open{
      display:grid;
      gap:8px;
    }
    .replyComposer{
      display:none;
      gap:8px;
      margin-top:8px;
    }
    .replyComposer.open{ display:grid; }
    .replyComposer textarea{
      width:100%;
      min-height:70px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.18);
      padding: 10px 12px;
      box-sizing: border-box;
      resize: vertical;
      font: inherit;
    }
    .replyItem{
      background: rgba(248,250,252,.92);
    }

    @media (max-width: 760px){
      .topbar{ padding: 10px; }
      .bar{ gap:8px; }
      .wrap{ padding: 0 10px; margin: 12px auto 22px; }
      .title{ font-size: 22px; }
      .headRow{ align-items:center; }
      .card{ padding: 12px; border-radius: 16px; }
      .panel{ border-radius: 12px; }
      .leaderPanel::before{
        background-position-y: -66px;
      }
      .leaderImg{
        width: calc(84px * 0.72);
        height: 84px;
        border-radius: 9px;
      }
      .hoverUsers{ width: min(220px, calc(100vw - 40px)); }
      .socialRow .iconBtn{ flex: 1 1 auto; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="bar">
      <a class="brandLink" href="index.html" aria-label="Ir a la home">
        <div class="brand">
          <img class="brandLogo" src="BT_LOGO.png" alt="BARATEAM HUB" />
          <small>cards | decks | wrapped</small>
        </div>
      </a>
      <div class="nav hubNavFlow">
        <a class="navInlineLink" href="index.html">Home</a>
        <div class="navInlineGroup">
          <button class="navInlineButton" type="button" aria-expanded="false" aria-controls="simStatsMenu" aria-haspopup="true">
            <span>SIM Stats</span>
            <span class="navInlineCaret" aria-hidden="true">v</span>
          </button>
          <div class="navInlineMenu" id="simStatsMenu">
            <a class="navInlineMenuLink" href="sim-stats/frontend/stats.html" data-requires-auth="1">Stats Propios</a>
            <a class="navInlineMenuLink" href="sim-stats/frontend/team-stats.html" data-requires-auth="1">Team Stats</a>
            <a class="navInlineMenuLink" href="leader-stats.html">Global Leader Stats</a>
          </div>
        </div>
        <a class="navInlineLink" href="ranking.html" data-requires-auth="1">Ranking</a>
        <div class="navInlineGroup is-current">
          <button class="navInlineButton" type="button" aria-expanded="false" aria-controls="cardToolsMenu" aria-haspopup="true">
            <span>Card Tools</span>
            <span class="navInlineCaret" aria-hidden="true">v</span>
          </button>
          <div class="navInlineMenu" id="cardToolsMenu">
            <a class="navInlineMenuLink" href="cards.html">Card List</a>
            <a class="navInlineMenuLink is-current" href="decks.html">DeckLists</a>
            <a class="navInlineMenuLink" href="op-wrapped.html">OP Wrapped</a>
          </div>
        </div>
        <a class="navInlineLink" href="encuestas.html">Encuestas</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="headRow">
        <h1 class="title" id="deckName">Deck</h1>
        <div class="headActions">
          <a class="btn btnLight btnTiny" href="decks.html">&#8592; Volver a decks</a>
          <button class="copyIconBtn shareCopyBtn" id="btnCopyDeckLink" type="button" title="Copiar enlace para compartir" aria-label="Copiar enlace para compartir">
            <svg viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 4h4v4"></path>
              <path d="M8 12 16 4"></path>
              <rect x="4" y="8" width="8" height="8" rx="2"></rect>
            </svg>
          </button>
        </div>
      </div>
      <div class="meta">
        <span id="deckAuthor">Autor: -</span>
        <span id="deckCreated">Creado: -</span>
      </div>
      <div class="actionsRow">
        <button class="btn btnLight" id="btnEditDeck" type="button" style="display:none;">Editar deck</button>
      </div>

      <div class="grid">
        <div class="panel leaderPanel" id="leaderPanel">
          <h3>Lider</h3>
          <div class="leaderRow">
            <img id="leaderImage" class="leaderImg" alt="Lider" />
            <div>
              <div class="leaderName" id="leaderName">-</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <h3>Descripcion</h3>
          <pre id="description">-</pre>
        </div>

        <div class="panel" id="deckImagePanel">
          <h3>Imagen del deck</h3>
          <img id="deckImage" class="deckImg" alt="Imagen del deck" />
          <div class="muted" id="deckImageEmpty" style="display:none; margin-top:8px;">Este deck no tiene imagen.</div>
        </div>

        <div class="panel">
          <div class="panelHead">
            <h3>Sim paste</h3>
            <button class="copyIconBtn" id="btnCopySimPaste" type="button" title="Copiar lista" aria-label="Copiar lista">
              <svg viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="7" y="3.5" width="9" height="11" rx="2"></rect>
                <path d="M5 7.5H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-1"></path>
              </svg>
            </button>
          </div>
          <div id="simPasteVisual" class="simPasteCards">
            <div class="muted">-</div>
          </div>
          <pre id="simPaste" class="srOnly">-</pre>
        </div>
      </div>
      <div class="panel editPanel" id="editPanel">
        <h3>Editar deck</h3>
        <div class="editGrid">
          <div>
            <label for="editName">Nombre</label>
            <input id="editName" type="text" />
          </div>
          <div>
            <label for="editLeader">Lider</label>
            <select id="editLeader">
              <option value="">(Selecciona lider)</option>
            </select>
          </div>
          <div>
            <label for="editImageUrl">Deck image URL</label>
            <input id="editImageUrl" type="text" />
          </div>
          <div>
            <label for="editImageFile">Subir imagen de deck</label>
            <input id="editImageFile" type="file" accept="image/*" />
          </div>
          <div>
            <label for="editDescription">Descripcion</label>
            <textarea id="editDescription"></textarea>
          </div>
          <div>
            <label for="editSimPaste">Sim paste</label>
            <textarea id="editSimPaste"></textarea>
          </div>
        </div>
        <div class="editActions">
          <button class="btn btnDanger" id="btnDeleteDeck" type="button">Eliminar deck</button>
          <button class="btn btnLight" id="btnCancelEditDeck" type="button">Cancelar</button>
          <button class="btn btnLight" id="btnSaveEditDeck" type="button">Guardar cambios</button>
        </div>
      </div>

      <div class="card socialCard">
        <div class="socialRow">
          <div class="likeWrap">
            <button class="iconBtn" id="btnLike" type="button">&#128077; 0</button>
            <div class="hoverUsers" id="likeUsersHover"></div>
          </div>
          <button class="iconBtn" id="btnToggleComments" type="button">Comentarios (0)</button>
        </div>

        <div class="commentsPanel" id="commentsPanel">
          <div class="commentComposer" id="commentComposer"></div>
          <div class="commentList" id="commentsList"></div>
        </div>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const sb = window.BarateamApp.createClient();
    window.BarateamApp.bindProtectedNavLinks(sb);

    const $ = window.BarateamApp.byId;

    let currentUser = null;
    let deckId = null;
    let currentDeck = null;
    let isDeckOwner = false;
    let profileCache = new Map();
    let socialState = { comments: [], likes: [], likedByMe: false };
    let editLeaders = [];
    let editLeaderByLabel = new Map();

    const escapeHtml = window.BarateamApp.escapeHtml;
    const escapeAttr = window.BarateamApp.escapeAttr;
    const showError = (text) => window.BarateamApp.showMessage("msg", text, { baseClass: "msg" });
    const formatDate = window.BarateamApp.formatDate;
    const formatDateTime = window.BarateamApp.formatDateTime;

    function setImage(el, url){
      if (url){
        el.src = url;
        el.style.display = "block";
      } else {
        el.removeAttribute("src");
        el.style.display = "none";
      }
    }

    function userLabel(userId){
      if (!userId) return "Usuario";
      if (profileCache.has(userId)) return profileCache.get(userId);
      return "usuario";
    }

    function norm(value){
      return String(value || "").trim();
    }

    function leaderLabelFromRow(row){
      const name = norm(row?.name);
      const code = norm(row?.code);
      return [name, code].filter(Boolean).join(" ").trim();
    }

    function leaderImageFromRow(row){
      return norm(row?.parallel_image_url || row?.image_url);
    }

    function resolveLeaderForDeck(leaderLabel){
      const normalized = norm(leaderLabel);
      if (!normalized) return null;
      const lower = normalized.toLowerCase();
      const direct = editLeaderByLabel.get(normalized);
      if (direct) return direct;
      return editLeaders.find((l) => (
        l.searchLabel === lower ||
        l.searchName === lower ||
        l.searchCode === lower ||
        l.searchLabel.startsWith(lower) ||
        lower.startsWith(l.searchName)
      )) || null;
    }

    function deckLeaderImage(deck){
      const byLeader = resolveLeaderForDeck(deck?.leader || "");
      const fromLeaders = norm(byLeader?.image || "");
      if (fromLeaders) return fromLeaders;
      return norm(deck?.leader_image_url);
    }

    function normalizeCardCode(value){
      const raw = String(value || "")
        .trim()
        .toUpperCase()
        .replace(/[\u2010\u2011\u2012\u2013\u2014\u2015]/g, "-")
        .replace(/\s+/g, "");
      if (!raw) return "";

      const normalized = raw.replace(/_/g, "-");
      const promoMatch = normalized.match(/^P-?0*(\d{1,3})$/);
      if (promoMatch){
        return `P-${promoMatch[1].padStart(3, "0")}`;
      }

      return normalized;
    }

    function buildDotggCardImageUrl(value){
      const code = normalizeCardCode(value);
      if (!code) return "";
      return `https://static.dotgg.gg/onepiece/card/${encodeURIComponent(code)}.webp`;
    }

    function parseSimPasteItems(text){
      return String(text || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const match = line.match(/^(\d+)\s*x\s*(.+)$/i);
          if (!match) return null;
          const qty = Number(match[1] || 0);
          const code = normalizeCardCode(match[2]);
          if (!qty || !code) return null;
          return { qty, code };
        })
        .filter(Boolean);
    }

    function renderSimPasteCard(item){
      const label = item?.code || "Carta";
      const badgeText = `${item?.qty || 0}x`;
      const src = buildDotggCardImageUrl(label);
      if (!src){
        return `<div class="simCard" title="${escapeAttr(label)}"><div class="simCardFallback">${escapeHtml(label)}</div><div class="simCardBadge">${escapeHtml(badgeText)}</div></div>`;
      }
      return `<div class="simCard cardZoom" title="${escapeAttr(label)}" data-preview-src="${escapeAttr(src)}" data-preview-label="${escapeAttr(label)}"><img src="${escapeAttr(src)}" alt="${escapeAttr(label)}" loading="lazy" data-sim-card-label="${escapeAttr(label)}"><div class="simCardBadge">${escapeHtml(badgeText)}</div></div>`;
    }

    function renderSimPasteVisual(text){
      const host = $("simPasteVisual");
      if (!host) return;

      const rawText = String(text || "");
      const trimmed = rawText.trim();
      if (!trimmed || trimmed === "-"){
        host.innerHTML = '<div class="muted">-</div>';
        return;
      }

      const items = parseSimPasteItems(rawText);
      if (!items.length){
        host.innerHTML = `<pre class="simPasteInlineText">${escapeHtml(trimmed)}</pre>`;
        return;
      }

      host.innerHTML = items.map((item) => renderSimPasteCard(item)).join("");
    }

    function handleSimPasteImageError(event){
      const target = event.target;
      if (!(target instanceof HTMLImageElement)) return;
      const card = target.closest(".simCard");
      const host = target.closest("#simPasteVisual");
      if (!card || !host) return;
      if (card.querySelector(".simCardFallback")) return;

      const fallback = document.createElement("div");
      fallback.className = "simCardFallback";
      fallback.textContent = target.dataset.simCardLabel || target.alt || "Carta";
      card.classList.remove("cardZoom");
      delete card.dataset.previewSrc;
      delete card.dataset.previewLabel;
      target.remove();
      card.prepend(fallback);
    }

    function initCardHoverPreview(){
      const preview = document.createElement("div");
      preview.className = "cardPreview";
      preview.innerHTML = `<img alt="">`;
      document.body.appendChild(preview);

      const img = preview.querySelector("img");
      let activeAnchor = null;

      function place(anchor){
        if (!anchor) return;
        const rect = anchor.getBoundingClientRect();
        const margin = 12;
        const pw = preview.offsetWidth || 236;
        const ph = preview.offsetHeight || 336;
        let x = rect.right + 12;
        let y = rect.top + ((rect.height - ph) / 2);
        if (x + pw > window.innerWidth - margin) x = rect.left - pw - 12;
        if (y < margin) y = margin;
        if (y + ph > window.innerHeight - margin) y = Math.max(margin, window.innerHeight - ph - margin);
        preview.style.transform = `translate3d(${Math.round(x)}px, ${Math.round(y)}px, 0)`;
      }

      function show(anchor){
        const src = anchor?.dataset?.previewSrc || "";
        if (!src){ hide(); return; }
        activeAnchor = anchor;
        img.src = src;
        img.alt = anchor?.dataset?.previewLabel || "Carta";
        preview.style.opacity = "1";
        place(anchor);
      }

      function hide(){
        activeAnchor = null;
        preview.style.opacity = "0";
        preview.style.transform = "translate3d(-9999px,-9999px,0)";
      }

      document.addEventListener("mouseover", (e) => {
        const target = e.target instanceof Element ? e.target : null;
        const anchor = target ? target.closest(".cardZoom[data-preview-src]") : null;
        if (!anchor){
          if (activeAnchor && target && !preview.contains(target)) hide();
          return;
        }
        show(anchor);
      });

      document.addEventListener("mouseout", (e) => {
        const target = e.target instanceof Element ? e.target : null;
        const from = target ? target.closest(".cardZoom[data-preview-src]") : null;
        if (!from) return;
        const to = e.relatedTarget;
        if (to instanceof Node && (from.contains(to) || preview.contains(to))) return;
        hide();
      });

      window.addEventListener("scroll", () => { if (activeAnchor) place(activeAnchor); }, true);
      window.addEventListener("resize", () => { if (activeAnchor) place(activeAnchor); });
    }

    async function initEditLeaders(){
      const { data, error } = await sb
        .from("leaders")
        .select("*")
        .order("name", { ascending: true })
        .limit(500);

      if (error){
        console.warn("leaders:", error.message);
        editLeaders = [];
        editLeaderByLabel = new Map();
        fillEditLeaderSelect();
        return;
      }

      const mapped = (data || [])
        .map((row) => {
          const label = leaderLabelFromRow(row);
          if (!label) return null;
          const name = norm(row?.name);
          const code = norm(row?.code);
          return {
            label,
            image: leaderImageFromRow(row) || null,
            name,
            code,
            searchLabel: label.toLowerCase(),
            searchName: name.toLowerCase(),
            searchCode: code.toLowerCase()
          };
        })
        .filter(Boolean);

      const uniq = new Map();
      for (const l of mapped){
        if (!uniq.has(l.label)) uniq.set(l.label, l);
      }

      editLeaders = Array.from(uniq.values());
      editLeaderByLabel = new Map(editLeaders.map((l) => [l.label, l]));
      fillEditLeaderSelect();
    }

    async function uploadDeckImage(file, userId){
      if (!file) return null;

      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const safeExt = ext.replace(/[^a-z0-9]/g, "") || "jpg";
      const fileName = `${Date.now()}-${Math.random().toString(16).slice(2)}.${safeExt}`;
      const path = `${userId}/${fileName}`;

      const { error: upErr } = await sb
        .storage
        .from("deck-images")
        .upload(path, file, { upsert: false, contentType: file.type });

      if (upErr) throw upErr;
      const { data } = sb.storage.from("deck-images").getPublicUrl(path);
      return data?.publicUrl || null;
    }

    function profileHref(userId){
      if (!userId) return "";
      return `user.html?id=${encodeURIComponent(userId)}`;
    }

    function profileLink(userId, label){
      const safeLabel = label || "Usuario";
      if (!userId) return escapeHtml(safeLabel);
      return `<a class="userLink" href="${escapeAttr(profileHref(userId))}">${escapeHtml(safeLabel)}</a>`;
    }

    async function fillProfiles(userIds){
      const ids = Array.from(new Set((userIds || []).filter(Boolean)));
      const missing = ids.filter(id => !profileCache.has(id));
      if (!missing.length) return;

      const { data, error } = await sb
        .from("profiles")
        .select("id,username")
        .in("id", missing);

      if (error){
        console.warn("profiles:", error.message);
        for (const id of missing){
          if (!profileCache.has(id)) profileCache.set(id, "usuario");
        }
        return;
      }

      for (const row of (data || [])){
        const label = row.username || row.id?.slice(0, 8) || "usuario";
        profileCache.set(row.id, label);
      }
      for (const id of missing){
        if (!profileCache.has(id)) profileCache.set(id, "usuario");
      }
    }

    async function saveDeckEdits(){
      if (!isDeckOwner || !currentDeck || !deckId){
        showError("No tienes permisos para editar este deck.");
        return;
      }

      try{
        const selectedLeader = norm($("editLeader").value);
        const leaderData = editLeaderByLabel.get(selectedLeader) || null;
        let nextImageUrl = norm($("editImageUrl").value) || null;
        const editFile = $("editImageFile").files?.[0] || null;
        if (editFile){
          nextImageUrl = await uploadDeckImage(editFile, currentUser.id);
        }

        const payload = {
          name: $("editName").value.trim() || null,
          leader: selectedLeader || null,
          leader_image_url: leaderData?.image || null,
          image_url: nextImageUrl,
          description: $("editDescription").value.trim() || null,
          sim_paste: $("editSimPaste").value.trim() || null
        };

        const { data, error } = await sb
          .from("decks")
          .update(payload)
          .eq("id", deckId)
          .eq("autor", currentUser.id)
          .select("id, name, created_at, autor, leader, leader_image_url, image_url, description, sim_paste")
          .maybeSingle();

        if (error){
          showError("No pude guardar los cambios: " + error.message);
          return;
        }
        if (!data){
          showError("No se pudo actualizar el deck (permisos o registro).");
          return;
        }

        currentDeck = data;
        renderDeck(currentDeck);
        closeEditPanel();
        window.BarateamApp.showMessage("msg", "Deck actualizado", { baseClass: "msg", type: "ok" });
      }catch(e){
        showError("No pude guardar los cambios: " + (e.message || "unknown"));
      }
    }

    async function loadDeckSocial(){
      if (!deckId) return;

      const [commentsRes, likesRes] = await Promise.all([
        sb.from("comments")
          .select("id,created_at,autor,body,deck,parent_comment")
          .eq("deck", deckId)
          .order("created_at", { ascending: false }),
        sb.from("likes")
          .select("id,created_at,autor,deck")
          .eq("deck", deckId)
      ]);

      if (commentsRes.error) console.warn("comments:", commentsRes.error.message);
      if (likesRes.error) console.warn("likes:", likesRes.error.message);

      const comments = commentsRes.data || [];
      const likes = likesRes.data || [];

      await fillProfiles([
        ...comments.map(c => c.autor),
        ...likes.map(l => l.autor)
      ]);

      socialState = {
        comments,
        likes,
        likedByMe: !!(currentUser && likes.some(l => l.autor === currentUser.id))
      };

      renderSocial();
    }

    function buildCommentThreads(comments){
      const roots = [];
      const repliesByParent = new Map();

      for (const comment of comments || []){
        if (comment.parent_comment){
          const key = String(comment.parent_comment);
          if (!repliesByParent.has(key)) repliesByParent.set(key, []);
          repliesByParent.get(key).push(comment);
        } else {
          roots.push(comment);
        }
      }

      for (const replies of repliesByParent.values()){
        replies.sort((a, b) => String(a.created_at || "").localeCompare(String(b.created_at || "")));
      }

      return { roots, repliesByParent };
    }

    function renderRepliesHtml(replies){
      return replies.map(reply => `
        <div class="commentItem replyItem">
          <div class="commentHead">
            <span class="commentUser">${profileLink(reply.autor, userLabel(reply.autor))}</span>
            <span>${escapeHtml(formatDateTime(reply.created_at))}</span>
          </div>
          <p class="commentBody">${escapeHtml(reply.body || "")}</p>
        </div>
      `).join("");
    }

    function renderCommentThreadHtml(comment, replies){
      const replyCount = replies.length;
      const replyToggleHtml = replyCount
        ? `<button class="commentActionBtn btnToggleReplies" data-parent-id="${escapeAttr(comment.id)}" type="button">Respuestas (${replyCount})</button>`
        : "";
      const replyComposerHtml = currentUser
        ? `
          <div class="replyComposer" data-parent-id="${escapeAttr(comment.id)}">
            <textarea class="replyInput" data-parent-id="${escapeAttr(comment.id)}" placeholder="Escribe una respuesta..."></textarea>
            <div>
              <button class="iconBtn btnSendReply" data-parent-id="${escapeAttr(comment.id)}" type="button">Responder</button>
              <button class="iconBtn btnCancelReply" data-parent-id="${escapeAttr(comment.id)}" type="button">Cancelar</button>
            </div>
          </div>
        `
        : "";

      return `
        <div class="commentThread">
          <div class="commentItem">
            <div class="commentHead">
              <span class="commentUser">${profileLink(comment.autor, userLabel(comment.autor))}</span>
              <span>${escapeHtml(formatDateTime(comment.created_at))}</span>
            </div>
            <p class="commentBody">${escapeHtml(comment.body || "")}</p>
            <div class="commentActions">
              ${replyToggleHtml}
              ${currentUser ? `<button class="commentActionBtn btnReplyComment" data-parent-id="${escapeAttr(comment.id)}" type="button">Responder</button>` : ""}
            </div>
            ${replyComposerHtml}
          </div>
          ${replyCount ? `<div class="commentReplies" data-parent-id="${escapeAttr(comment.id)}">${renderRepliesHtml(replies)}</div>` : ""}
        </div>
      `;
    }

    function renderSocial(){
      const likes = socialState.likes || [];
      const comments = socialState.comments || [];
      const threads = buildCommentThreads(comments);

      const likeBtn = $("btnLike");
      likeBtn.innerHTML = `&#128077; ${likes.length}`;
      likeBtn.classList.toggle("active", !!socialState.likedByMe);

      const likeUsersHover = $("likeUsersHover");
      likeUsersHover.innerHTML = likes.length
        ? likes.map(l => `<div class="u">${profileLink(l.autor, userLabel(l.autor))}</div>`).join("")
        : `<div class="u">Sin likes todavia.</div>`;

      $("btnToggleComments").textContent = `Comentarios (${comments.length})`;

      const composer = $("commentComposer");
      if (currentUser){
        composer.innerHTML = `
          <textarea id="commentInput" placeholder="Escribe un comentario..."></textarea>
          <div><button class="iconBtn" id="btnSendComment" type="button">Comentar</button></div>
        `;
        $("btnSendComment").addEventListener("click", () => submitDeckComment());
      } else {
        composer.innerHTML = `<div class="muted">Inicia sesion para comentar.</div>`;
      }

      const list = $("commentsList");
      if (!threads.roots.length){
        list.innerHTML = `<div class="muted">No hay comentarios.</div>`;
      } else {
        list.innerHTML = threads.roots.map(c => renderCommentThreadHtml(c, threads.repliesByParent.get(String(c.id)) || [])).join("");
      }

      for (const btn of list.querySelectorAll(".btnToggleReplies")){
        btn.addEventListener("click", () => {
          const parentId = btn.getAttribute("data-parent-id");
          const panel = list.querySelector(`.commentReplies[data-parent-id="${parentId}"]`);
          if (!panel) return;
          const open = panel.classList.toggle("open");
          const count = panel.children.length;
          btn.textContent = `${open ? "Ocultar respuestas" : "Respuestas"} (${count})`;
        });
      }

      for (const btn of list.querySelectorAll(".btnReplyComment")){
        btn.addEventListener("click", () => {
          const parentId = btn.getAttribute("data-parent-id");
          const composer = list.querySelector(`.replyComposer[data-parent-id="${parentId}"]`);
          if (!composer) return;
          composer.classList.toggle("open");
          if (composer.classList.contains("open")){
            composer.querySelector(".replyInput")?.focus();
          }
        });
      }

      for (const btn of list.querySelectorAll(".btnCancelReply")){
        btn.addEventListener("click", () => {
          const parentId = btn.getAttribute("data-parent-id");
          const composer = list.querySelector(`.replyComposer[data-parent-id="${parentId}"]`);
          const input = list.querySelector(`.replyInput[data-parent-id="${parentId}"]`);
          if (input) input.value = "";
          composer?.classList.remove("open");
        });
      }

      for (const btn of list.querySelectorAll(".btnSendReply")){
        btn.addEventListener("click", async () => {
          const parentId = btn.getAttribute("data-parent-id");
          await submitDeckComment(parentId);
        });
      }
    }

    async function toggleDeckLike(){
      if (!currentUser){
        showError("Inicia sesion para dar like.");
        return;
      }
      if (!deckId) return;

      const { data: existing, error: exErr } = await sb
        .from("likes")
        .select("id")
        .eq("deck", deckId)
        .eq("autor", currentUser.id)
        .limit(1);

      if (exErr){
        showError("Error en likes: " + exErr.message);
        return;
      }

      if (existing && existing.length){
        const { error } = await sb
          .from("likes")
          .delete()
          .eq("deck", deckId)
          .eq("autor", currentUser.id);

        const { error } = await sb.from("likes").insert({ autor: currentUser.id, deck: deckId });

    async function submitDeckComment(parentCommentId = null){
      if (!currentUser){
        showError("Inicia sesion para comentar.");
        return;
      }
      if (!deckId) return;

      const input = parentCommentId
        ? document.querySelector(`.replyInput[data-parent-id="${parentCommentId}"]`)
        : $("commentInput");
      const body = input?.value?.trim() || "";
      if (!body) return showError("Escribe un comentario.");

      const { error } = await sb.from("comments").insert({
        autor: currentUser.id,
        deck: deckId,
        body,
        parent_comment: parentCommentId || null
      });

      if (error) return showError("No pude guardar el comentario: " + error.message);

      input.value = "";
      await loadDeckSocial();
    }

    async function copyDeckLink(){
      const button = $("btnCopyDeckLink");
      try{
        await navigator.clipboard.writeText(window.location.href);
        if (button){
          button.innerHTML = copyIconSvg("check");
          button.classList.add("isCopied");
          button.setAttribute("aria-label", "Enlace copiado");
          button.setAttribute("title", "Enlace copiado");
          window.setTimeout(() => {
            button.innerHTML = copyIconSvg("share");
            button.classList.remove("isCopied");
            button.setAttribute("aria-label", "Copiar enlace para compartir");
            button.setAttribute("title", "Copiar enlace para compartir");
          }, 1400);
        }
      }catch(_e){
        showError("No pude copiar el enlace.");
      }
    }

    function copyIconSvg(state = "copy"){
      if (state === "check"){
        return `
          <svg viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 10.5l4 4 8-9"></path>
          </svg>
        `;
      }
      if (state === "share"){
        return `
          <svg viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4h4v4"></path>
            <path d="M8 12 16 4"></path>
            <rect x="4" y="8" width="8" height="8" rx="2"></rect>
          </svg>
        `;
      }
      return `
        <svg viewBox="0 0 20 20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="7" y="3.5" width="9" height="11" rx="2"></rect>
          <path d="M5 7.5H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-1"></path>
        </svg>
      `;
    }

    async function copySimPaste(){
      const text = String($("simPaste")?.textContent || "").trim();
      if (!text || text === "-"){
        showError("No hay lista para copiar.");
        return;
      }
      const button = $("btnCopySimPaste");
      try{
        await navigator.clipboard.writeText(text);
        if (button){
          button.innerHTML = copyIconSvg("check");
          button.classList.add("isCopied");
          button.setAttribute("aria-label", "Lista copiada");
          button.setAttribute("title", "Lista copiada");
          window.setTimeout(() => {
            button.innerHTML = copyIconSvg("copy");
            button.classList.remove("isCopied");
            button.setAttribute("aria-label", "Copiar lista");
            button.setAttribute("title", "Copiar lista");
          }, 1400);
        }
      }catch(_e){
        showError("No pude copiar la lista.");
      }
    }

    $("btnLike").addEventListener("click", toggleDeckLike);
    $("btnToggleComments").addEventListener("click", () => {
      $("commentsPanel").classList.toggle("open");
    });
    $("btnEditDeck").addEventListener("click", openEditPanel);
    $("btnCopyDeckLink").addEventListener("click", copyDeckLink);
    $("btnCopySimPaste").addEventListener("click", copySimPaste);
    $("btnCancelEditDeck").addEventListener("click", closeEditPanel);
    $("btnSaveEditDeck").addEventListener("click", saveDeckEdits);
    $("btnDeleteDeck").addEventListener("click", deleteDeck);
    document.addEventListener("error", handleSimPasteImageError, true);
    initCardHoverPreview();

    (async function init(){
      await refreshSession();
      await initEditLeaders();
      const ok = await loadDeck();
      if (!ok) return;
      await loadDeckSocial();

      sb.auth.onAuthStateChange(async (_event, session) => {
        currentUser = session?.user || null;
        computeDeckOwner();
        renderDeckOwnerUI();
        await loadDeckSocial();
      });
    })();
  </script>
</body>
