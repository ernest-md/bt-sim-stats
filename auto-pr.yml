name: Auto PR main -> app-stats

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear PR si no existe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTS=$(gh pr list \
            --base app-stats \
            --head main \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTS" -eq "0" ]; then
            gh pr create \
              --base app-stats \
              --head main \
              --title "Sync main -> app-stats" \
              --body "PR creado automáticamente al hacer push en main"
          else
            echo "Ya existe un PR abierto de main a app-stats"
          fi
