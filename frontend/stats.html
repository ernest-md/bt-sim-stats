<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Stats · Team Hub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="page">
    <div class="card">

      <!-- HEADER -->
      <div class="headerRow">
        <div class="title">Barateam Stats</div>

        <div class="filters">
          <div class="filterBlock">
            Jugador:
            <select id="playerSelect"></select>
          </div>

          <div class="filterBlock">
            Expansión:
            <select id="expansionSelect"></select>
          </div>
          <button id="syncMatchesBtn" class="sync-btn">
            🔄 Cargar partidas
          </button>
        </div>
      </div>

      <!-- SUMMARY VIEW -->
      <div id="summaryView">

        <!-- RESUMEN -->
        <div class="summary">
          <div class="summaryBox">
            Total
            <strong id="total">-</strong>
          </div>

          <div class="summaryBox">
            Victorias
            <strong id="wins">-</strong>
          </div>

          <div class="summaryBox">
            Derrotas
            <strong id="losses">-</strong>
          </div>

          <div class="summaryBox">
            WR
            <strong id="wr">-</strong>
          </div>
        </div>

        <!-- TABLAS -->
        <div class="mainLayout">

          <div class="leaders">
            <h3>Estadísticas por líder</h3>

            <table>
              <thead>
                <tr>
                  <th style="width:80px;">Img</th>
                  <th style="width:120px;">Carta</th>
                  <th>Partidas</th>
                  <th>Victorias</th>
                  <th>Derrotas</th>
                  <th>WR</th>
                  <th>Fav</th>
                  <th>Desf</th>
                </tr>
              </thead>
              <tbody id="leaderStats"></tbody>
            </table>
          </div>

          <div class="matchups">

            <h3>Matchups Globales</h3>

            <h4>Más victorias</h4>
            <table>
              <thead>
                <tr>
                  <th>Líder</th>
                  <th>W</th>
                  <th>P</th>
                  <th>WR</th>
                </tr>
              </thead>
              <tbody id="topWins"></tbody>
            </table>

            <h4>Más derrotas</h4>
            <table>
                <thead>
                  <tr>
                    <th>Líder</th>
                    <th>L</th>
                    <th>P</th>
                    <th>WR</th>
                  </tr>
                </thead>
              <tbody id="topLosses"></tbody>
            </table>

          </div>

        </div>
      </div>

      <!-- LEADER VIEW -->
      <div id="leaderView" style="display:none; margin-top:20px;">

        <button id="backToSummary">← Volver</button>

        <div id="leaderSummary" class="leaderSummary"></div>

        <table style="margin-top:20px;">
          <thead>
            <tr>
              <th>Img</th>
              <th>Líder</th>
              <th>Partidas</th>
              <th>Victorias</th>
              <th>Derrotas</th>
              <th>WR</th>
              <th>First</th>
              <th>WR First</th>
              <th>Second</th>
              <th>WR Second</th>
            </tr>
          </thead>
          <tbody id="leaderMatchups"></tbody>
        </table>

      </div>

    </div>
  </div>

  <script type="module" src="./js/stats.js"></script>

</body>
</html>
