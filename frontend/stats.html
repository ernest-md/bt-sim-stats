<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Stats · Team Hub</title>

  <style>

    /* ===== FONDO GENERAL ===== */
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#0f172a; /* oscuro elegante */
      color:#111;
    }

    /* ===== CONTENEDOR CENTRAL ===== */
    .page{
      width:80%;
      margin:40px auto;
    }

    /* ===== CARD PRINCIPAL ===== */
    .card{
      background:#ffffff;
      border-radius:16px;
      padding:25px;
      box-shadow:0 15px 40px rgba(0,0,0,.35);
      border:1px solid rgba(0,0,0,.08);
    }

    /* ===== HEADER SUPERIOR ===== */
    .headerRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .title{
      font-size:22px;
      font-weight:700;
      color:#111;
    }

    .filters{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      align-items:center;
    }

    .filterBlock{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:600;
      font-size:14px;
    }

    select{
      padding:6px 10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
      cursor:pointer;
    }

    /* ===== RESUMEN ===== */
    .summary{
      display:flex;
      gap:15px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }

    .summaryBox{
      flex:1;
      min-width:120px;
      background:#f8fafc;
      border-radius:12px;
      padding:12px;
      text-align:center;
      border:1px solid #e5e7eb;
    }

    .summaryBox strong{
      display:block;
      font-size:18px;
      margin-top:4px;
    }

    /* ===== TABLAS ===== */
    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }

    th{
      text-align:left;
      padding:8px;
      border-bottom:2px solid #ddd;
      background:#f1f5f9;
      font-weight:600;
    }

    td{
      padding:6px;
      border-bottom:1px solid #eee;
      vertical-align:middle;
    }

    tr:hover{
      background:#f8fafc;
    }

    .mainLayout{
      display:flex;
      gap:40px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .leaders{
      flex:3;
      min-width:600px;
    }

    .matchups{
      flex:1;
      min-width:280px;
      padding-left:25px;
      border-left:2px solid #e5e7eb;
    }

    .matchups h4{
      margin-top:20px;
      margin-bottom:10px;
    }

    .matchups table th,
    .matchups table td{
      text-align:center;
    }

    .matchups img{
      width:50px;
    }

  </style>
</head>

<body>

  <div class="page">

    <div class="card">

      <!-- HEADER -->
      <div class="headerRow">
        <div class="title">Barateam Stats</div>

        <div class="filters">
          <div class="filterBlock">
            Jugador:
            <select id="playerSelect"></select>
          </div>

          <div class="filterBlock">
            Expansión:
            <select id="expansionSelect"></select>
          </div>
        </div>
      </div>


      <!-- RESUMEN -->
      <div class="summary">
        <div class="summaryBox">
          Total
          <strong id="total">-</strong>
        </div>

        <div class="summaryBox">
          Victorias
          <strong id="wins">-</strong>
        </div>

        <div class="summaryBox">
          Derrotas
          <strong id="losses">-</strong>
        </div>

        <div class="summaryBox">
          WR
          <strong id="wr">-</strong>
        </div>
      </div>


      <!-- TABLAS -->
      <div class="mainLayout">

        <!-- TABLA PRINCIPAL -->
        <div class="leaders">

          <h3>Estadísticas por líder</h3>

          <table>
            <thead>
              <tr>
                <th style="width:80px;">Img</th>
                <th style="width:90px;">Carta</th>
                <th>Partidas</th>
                <th>Victorias</th>
                <th>Derrotas</th>
                <th>WR</th>
                <th>Fav</th>
                <th>Desf</th>
              </tr>
            </thead>
            <tbody id="leaderStats"></tbody>
          </table>

          <div id="leaderDetail" style="margin-top:30px;"></div>

        </div>


        <!-- MATCHUPS -->
        <div class="matchups">

          <h3>Matchups Globales</h3>

          <h4>Más victorias</h4>
          <table>
            <thead>
              <tr>
                <th>Líder</th>
                <th>W</th>
                <th>P</th>
              </tr>
            </thead>
            <tbody id="topWins"></tbody>
          </table>

          <h4>Más derrotas</h4>
          <table>
            <thead>
              <tr>
                <th>Líder</th>
                <th>L</th>
                <th>P</th>
              </tr>
            </thead>
            <tbody id="topLosses"></tbody>
          </table>

        </div>

      </div>

    </div>

  </div>

  <script type="module" src="./js/stats.js"></script>

</body>
</html>
