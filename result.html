<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resultado · Barateam Hub</title>
  <link rel="stylesheet" href="app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <style>
    :root{ --bg:#0b1220; --card: rgba(255,255,255,.94); --shadow: 0 18px 50px rgba(0,0,0,.35); }
    body{ margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:#0f172a; }
    body::before{ content:""; position:fixed; inset:0; background: radial-gradient(1200px 800px at 10% 10%, rgba(124,58,237,.35), transparent 60%), radial-gradient(900px 650px at 90% 20%, rgba(6,182,212,.28), transparent 60%), linear-gradient(180deg, rgba(11,18,32,.78), rgba(11,18,32,.78)), url("bg.png"); background-size:cover; background-position:center; z-index:-1; }
    .btn{ border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.12); }
    .card{ background:var(--card); border:1px solid rgba(255,255,255,.20); border-radius:22px; box-shadow:var(--shadow); padding:16px; }
    .title{ margin:0 0 10px; font-size:26px; font-weight:1000; }
    .meta{ color:#475569; font-size:13px; display:flex; gap:12px; flex-wrap:wrap; }
    .grid{ display:grid; grid-template-columns:1fr; gap:14px; margin-top:14px; }
    @media (min-width:980px){ .grid{ grid-template-columns:1fr 1fr; } }
    .panel{ border:1px solid rgba(15,23,42,.10); border-radius:16px; background: rgba(255,255,255,.72); padding:12px; }
    .panel h3{ margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:#334155; }
    .kv{ font-size:15px; color:#0f172a; font-weight:700; }
    .win{ color:#166534; font-weight:900; }
    .lose{ color:#991b1b; font-weight:900; }
    pre{ margin:0; white-space: pre-wrap; word-break: break-word; font-size:13px; line-height:1.45; color:#0f172a; }
    .msg{ margin-top:12px; border-radius:12px; padding:10px 12px; border:1px solid rgba(239,68,68,.35); background: rgba(239,68,68,.10); color:#991b1b; display:none; white-space: pre-line; }
    @media (max-width:760px){ .title{ font-size:22px; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="bar">
      <a class="btn" href="results.html">Volver a resultados</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h1 class="title">Detalle de resultado</h1>
      <div class="meta">
        <span id="created">Creado: -</span>
      </div>

      <div class="grid">
        <div class="panel">
          <h3>Evento</h3>
          <div class="kv" id="eventTitle">-</div>
          <div class="kv" id="eventDate" style="font-size:13px; font-weight:500; color:#475569; margin-top:4px;">-</div>
        </div>

        <div class="panel">
          <h3>Líder jugado</h3>
          <div class="kv" id="leader">-</div>
        </div>

        <div class="panel">
          <h3>Resultado</h3>
          <div class="kv"><span class="win" id="wins">0</span> - <span class="lose" id="loses">0</span></div>
        </div>

        <div class="panel">
          <h3>Body / notas</h3>
          <pre id="body">-</pre>
        </div>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const sb = window.BarateamApp.createClient();
    const $ = window.BarateamApp.byId;
    const showError = (text) => window.BarateamApp.showMessage("msg", text);
    const fmtDate = (v) => window.BarateamApp.formatDate(v, "—");
    const eventTitle = window.BarateamApp.eventTitle;
    const eventDate = window.BarateamApp.eventDate;
    const leaderLabel = window.BarateamApp.leaderLabel;

    async function requireSession(){
      const { data } = await sb.auth.getSession();
      const user = data?.session?.user || null;
      if (!user){ location.href = "login.html"; return null; }
      return user;
    }

    async function loadDetail(user){
      const id = new URLSearchParams(location.search).get("id");
      if (!id){ showError("Falta id de resultado en la URL."); return; }

      const { data: result, error } = await sb
        .from("results")
        .select("id,created_at,wins,loses,event,leader,description,autor")
        .eq("id", id)
        .eq("autor", user.id)
        .maybeSingle();

      if (error) return showError("Error cargando resultado: " + error.message);
      if (!result) return showError("No se encontró el resultado o no tienes permisos.");

      $("created").textContent = `Creado: ${fmtDate(result.created_at)}`;
      $("wins").textContent = Number(result.wins || 0);
      $("loses").textContent = Number(result.loses || 0);
      $("body").textContent = result.description || "-";

      if (result.event){
        const { data: ev } = await sb.from("events").select("*").eq("id", result.event).maybeSingle();
        $("eventTitle").textContent = eventTitle(ev);
        $("eventDate").textContent = eventDate(ev);
      } else {
        $("eventTitle").textContent = "—";
        $("eventDate").textContent = "—";
      }

      if (result.leader){
        const { data: ld } = await sb.from("leaders").select("*").eq("id", result.leader).maybeSingle();
        $("leader").textContent = leaderLabel(ld);
      } else {
        $("leader").textContent = "—";
      }
    }

    (async function init(){
      const user = await requireSession();
      if (!user) return;
      await loadDetail(user);
      sb.auth.onAuthStateChange((_e, s) => { if (!s?.user) location.href = "login.html"; });
    })();
  </script>
</body>
</html>
