<script>
  // ===== CONFIG =====
  const SUPABASE_URL = "https://ceunhkqhskwnsoqyunze.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNldW5oa3Foc2t3bnNvcXl1bnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDQ0ODcsImV4cCI6MjA4ODAyMDQ4N30.qBGXYYQXlyQwFGeyaeMOtLPHrjBy-eU05AO37yLvi5o";

  // ⚠️ IMPORTANTE: misma config en todas las páginas
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  });

  const USE_MOCK = false;

  const $ = (id) => document.getElementById(id);

  function withTimeout(promise, ms = 8000) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout auth")), ms))
    ]);
  }

  // ===== NAV auth =====
  function closeUserMenu(){ $("userMenu").classList.remove("open"); }
  function toggleUserMenu(){ $("userMenu").classList.toggle("open"); }

  function setNavAuthUI(user){
    const navLogin = $("navLogin");
    const navUser  = $("navUser");

    if (user){
      navLogin.style.display = "none";
      navUser.style.display = "flex";

      const email = user.email || "user";
      $("userEmail").textContent = email;
      $("userLabel").textContent = (email.split("@")[0] || "Usuario");
    } else {
      navLogin.style.display = "inline-flex";
      navUser.style.display = "none";
      closeUserMenu();
    }
  }

  async function refreshSession(){
    try{
      const { data } = await withTimeout(sb.auth.getSession());
      const user = data?.session?.user || null;
      setNavAuthUI(user);
      return user;
    }catch(e){
      console.warn("refreshSession:", e.message);
      setNavAuthUI(null);
      return null;
    }
  }

  async function doLogout(){
    try{
      await withTimeout(sb.auth.signOut(), 8000);
    }catch(e){
      console.warn("signOut:", e.message);
      // aunque falle, redirigimos para “salir” visualmente
    }finally{
      setNavAuthUI(null);
      closeUserMenu();
      location.href = "login.html";
    }
  }

  // Dropdown events
  $("userBtn")?.addEventListener("click", (e) => { e.preventDefault(); toggleUserMenu(); });
  $("menuLogout")?.addEventListener("click", async (e) => {
    e.preventDefault();
    await doLogout();
  });

  document.addEventListener("click", (e) => {
    const wrap = $("navUser");
    if (!wrap || wrap.style.display === "none") return;
    if (!wrap.contains(e.target)) closeUserMenu();
  });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeUserMenu(); });

  // Fecha topbar
  (function(){
    const el = $("today");
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    el.textContent = `📅 ${y}-${m}-${da}`;
  })();

  // ===== POSTS =====
  function showPostMsg(text, type){
    const el = $("postMsg");
    el.className = "msg " + (type || "");
    el.textContent = text;
    el.style.display = "block";
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }
  function escapeAttr(s){
    return String(s ?? "").replace(/"/g, "&quot;");
  }

  function renderPosts(posts){
    const root = $("postsList");
    root.innerHTML = "";

    if (!posts || posts.length === 0){
      root.innerHTML = `<div class="muted">No hay posts todavía.</div>`;
      return;
    }

    for (const p of posts){
      const date = (p.created_at || "").slice(0,10) || "—";
      const tag = p.tag || "General";
      const title = p.title || "Sin título";
      const body = p.body || "";

      const imgHtml = p.image_url
        ? `<img class="postImg" src="${escapeAttr(p.image_url)}" alt="">`
        : "";

      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `
        <h3>${escapeHtml(title)}</h3>
        <div class="meta">
          <span>📅 ${escapeHtml(date)}</span>
          <span>🏷️ ${escapeHtml(tag)}</span>
        </div>
        ${imgHtml}
        <p>${escapeHtml(body)}</p>
      `;
      root.appendChild(div);
    }
  }

  async function fetchPosts(){
    if (USE_MOCK){
      return [
        {
          id: 1,
          title: "🚀 Nuevo hub con login",
          tag: "Web",
          body: "Ya tenemos auth y perfil. Próximo: posts/eventos en BBDD.",
          image_url: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=1200&q=60",
          created_at: new Date().toISOString()
        },
      ];
    }

    const { data, error } = await sb
      .from("posts")
      .select("id,title,tag,body,image_url,created_at")
      .order("created_at", { ascending:false })
      .limit(30);

    if (error) {
      console.warn("posts:", error.message);
      return [];
    }
    return data || [];
  }

  async function uploadPostImage(file, userId){
    if (!file) return null;

    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const safeExt = ext.replace(/[^a-z0-9]/g, "") || "jpg";
    const fileName = `${Date.now()}-${Math.random().toString(16).slice(2)}.${safeExt}`;
    const path = `${userId}/${fileName}`;

    const { error: upErr } = await sb
      .storage
      .from("post-images")
      .upload(path, file, { upsert: false, contentType: file.type });

    if (upErr) throw upErr;

    const { data } = sb.storage.from("post-images").getPublicUrl(path);
    return data?.publicUrl || null;
  }

  async function getSafeSession(){
    // 1) intenta sesión (local)
    try{
      const { data } = await withTimeout(sb.auth.getSession(), 8000);
      if (data?.session) return data.session;
    }catch(e){
      console.warn("getSession timeout:", e.message);
    }

    // 2) intenta getUser (puede forzar refresh interno)
    try{
      const { data: udata, error: uerr } = await withTimeout(sb.auth.getUser(), 8000);
      if (uerr) console.warn("getUser:", uerr.message);
      if (udata?.user){
        const { data } = await withTimeout(sb.auth.getSession(), 8000);
        if (data?.session) return data.session;
      }
    }catch(e){
      console.warn("getUser timeout:", e.message);
    }

    return null;
  }

  async function publishPost(){
    const title = $("post_title").value.trim();
    const tag = $("post_tag").value.trim();
    const body = $("post_body").value.trim();
    const file = $("post_image_file").files?.[0] || null;

    if (!title || !body) return showPostMsg("Pon título y contenido.", "err");

    try{
      if (USE_MOCK){
        showPostMsg("Mock: post publicado ✅", "ok");
        return;
      }

      const session = await getSafeSession();
      if (!session){
        showPostMsg("No hay sesión (reloguea en login.html).", "err");
        return;
      }

      let image_url = null;
      if (file){
        image_url = await uploadPostImage(file, session.user.id);
      }

      // ✅ SOLO 4 CAMPOS
      const payload = {
        title,
        tag: tag || null,
        body,
        image_url: image_url || null
      };

      const { error } = await sb.from("posts").insert(payload);
      if (error) throw error;

      showPostMsg("Post publicado ✅", "ok");

      $("post_title").value = "";
      $("post_tag").value = "";
      $("post_body").value = "";
      $("post_image_file").value = "";

      renderPosts(await fetchPosts());
    }catch(e){
      console.error(e);
      showPostMsg("Error publicando: " + (e.message || "unknown"), "err");
    }
  }

  $("btnPublish")?.addEventListener("click", async () => {
    await publishPost();
  });

  // ===== EVENTS (lo dejamos como lo tenías, mock/real) =====
  function ymd(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${da}`;
  }

  async function fetchEventsForMonth(viewDate){
    if (USE_MOCK){
      const base = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
      const e1 = new Date(base.getFullYear(), base.getMonth(), 5, 19, 0);
      const e2 = new Date(base.getFullYear(), base.getMonth(), 12, 20, 0);
      return [
        { id: 1, title: "Liga local", start_at: e1.toISOString(), location: "Tienda" },
        { id: 2, title: "Testing night", start_at: e2.toISOString(), location: "Casa" },
      ];
    }

    const start = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    const end = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);

    const { data, error } = await sb
      .from("events")
      .select("id,title,start_at,location,description")
      .gte("start_at", start.toISOString())
      .lt("start_at", end.toISOString())
      .order("start_at", { ascending:true });

    if (error){
      console.warn("events:", error.message);
      return [];
    }
    return data || [];
  }

  function groupEventsByDay(events){
    const map = new Map();
    for (const e of events){
      const d = new Date(e.start_at);
      const key = ymd(d);
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(e);
    }
    for (const [k, arr] of map.entries()){
      arr.sort((a,b)=> (a.start_at||"").localeCompare(b.start_at||""));
    }
    return map;
  }

  function renderCalendar(viewDate, dayEventsMap){
    const title = $("calTitle");
    const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    title.textContent = `${monthNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

    const dow = ["L","M","X","J","V","S","D"];
    const dowRoot = $("calDow");
    dowRoot.innerHTML = "";
    for (const d of dow){
      const el = document.createElement("div");
      el.className = "dow";
      el.textContent = d;
      dowRoot.appendChild(el);
    }

    const grid = $("calGrid");
    grid.innerHTML = "";

    const todayKey = ymd(new Date());
    const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    const last = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0);
    const firstDow = (first.getDay() + 6) % 7; // lunes=0
    const totalDays = last.getDate();

    for (let i=0;i<firstDow;i++){
      const blank = document.createElement("div");
      blank.className = "day muted";
      grid.appendChild(blank);
    }

    for (let day=1; day<=totalDays; day++){
      const d = new Date(viewDate.getFullYear(), viewDate.getMonth(), day);
      const key = ymd(d);

      const cell = document.createElement("div");
      cell.className = "day" + (key === todayKey ? " today" : "");

      const events = dayEventsMap.get(key) || [];
      if (events.length) cell.classList.add("hasEvents");

      cell.innerHTML = `
        <span>${day}</span>
        <span class="dot"></span>
        ${events.length ? `
          <div class="tooltip">
            <div class="tipTitle">${events.length} evento(s)</div>
            ${events.slice(0,5).map(ev => {
              const dt = new Date(ev.start_at);
              const hh = String(dt.getHours()).padStart(2,"0");
              const mm = String(dt.getMinutes()).padStart(2,"0");
              const loc = ev.location ? ` · ${escapeHtml(ev.location)}` : "";
              return `<div class="tipItem">🕒 ${hh}:${mm} · <strong>${escapeHtml(ev.title)}</strong>${loc}</div>`;
            }).join("")}
          </div>
        ` : ""}
      `;
      grid.appendChild(cell);
    }
  }

  function renderUpcoming(events){
    const root = $("upcomingList");
    root.innerHTML = "";

    const now = new Date();
    const upcoming = (events || [])
      .filter(e => new Date(e.start_at) >= new Date(now.getFullYear(), now.getMonth(), now.getDate()))
      .slice()
      .sort((a,b)=> (a.start_at||"").localeCompare(b.start_at||""))
      .slice(0, 6);

    if (!upcoming.length){
      root.innerHTML = `<div class="muted">No hay eventos próximos.</div>`;
      return;
    }

    for (const e of upcoming){
      const dt = new Date(e.start_at);
      const d = ymd(dt);
      const hh = String(dt.getHours()).padStart(2,"0");
      const mm = String(dt.getMinutes()).padStart(2,"0");

      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `
        <p class="t">${escapeHtml(e.title || "Evento")}</p>
        <p class="s">
          <span>📅 ${escapeHtml(d)}</span>
          <span>🕒 ${hh}:${mm}</span>
          ${e.location ? `<span>📍 ${escapeHtml(e.location)}</span>` : ``}
        </p>
      `;
      root.appendChild(div);
    }
  }

  // ===== Init =====
  let viewDate = new Date();
  let monthEvents = [];

  async function refreshHome(){
    await refreshSession();
    renderPosts(await fetchPosts());

    monthEvents = await fetchEventsForMonth(viewDate);
    const map = groupEventsByDay(monthEvents);

    renderCalendar(viewDate, map);
    renderUpcoming(monthEvents);
  }

  $("btnPrev")?.addEventListener("click", async () => {
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1);
    await refreshHome();
  });
  $("btnNext")?.addEventListener("click", async () => {
    viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1);
    await refreshHome();
  });
  $("btnToday")?.addEventListener("click", async () => {
    const d = new Date();
    viewDate = new Date(d.getFullYear(), d.getMonth(), 1);
    await refreshHome();
  });

  (async function(){
    sb.auth.onAuthStateChange(async (_event, session) => {
      setNavAuthUI(session?.user || null);
    });
    await refreshHome();
  })();
</script>
