<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Perfil · Team Hub</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family: system-ui, sans-serif;
      background:#0b1220;
      color:#0f172a;
    }

    .wrap{
      max-width: 640px;
      margin: 60px auto;
      background: rgba(255,255,255,.92);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    h1{ margin:0 0 10px; }
    p{ margin:0 0 14px; color:#475569; }

    label{
      font-weight:900;
      display:block;
      margin-bottom:6px;
      font-size:13px;
    }

    input, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid #cbd5f5;
      box-sizing:border-box;
      margin-bottom:12px;
      font-size:14px;
    }

    textarea{ resize:vertical; min-height:80px; }

    button{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color:#fff;
    }

    .msg{
      margin-top:12px;
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
    }
    .ok{ background:#dcfce7; color:#166534; }
    .err{ background:#fee2e2; color:#991b1b; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Tu perfil</h1>
    <p>Edita cómo apareces en el Team Hub.</p>

    <label>Email</label>
    <input id="email" disabled>

    <label>Username</label>
    <input id="username" placeholder="ej: coquito">

    <label>Nombre visible</label>
    <input id="display_name" placeholder="Ej: Ernest">

    <label>Bio</label>
    <textarea id="bio" placeholder="Jugador de OP, main X…"></textarea>

    <button onclick="saveProfile()">Guardar cambios</button>

    <div id="msg" class="msg" style="display:none;"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://ceunhkqhskwnsoqyunze.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNldW5oa3Foc2t3bnNvcXl1bnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDQ0ODcsImV4cCI6MjA4ODAyMDQ4N30.qBGXYYQXlyQwFGeyaeMOtLPHrjBy-eU05AO37yLvi5o";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);

    function show(text, type){
      const m = $("msg");
      m.style.display = "block";
      m.className = "msg " + type;
      m.textContent = text;
    }

    async function loadProfile(){
      const { data: { session } } = await sb.auth.getSession();
      if (!session){
        location.href = "login.html";
        return;
      }

      const user = session.user;
      $("email").value = user.email;

      const { data, error } = await sb
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (error && error.code !== "PGRST116"){
        show("Error cargando perfil", "err");
        return;
      }

      if (!data){
        await sb.from("profiles").insert({ id: user.id });
        return;
      }

      $("username").value = data.username || "";
      $("display_name").value = data.display_name || "";
      $("bio").value = data.bio || "";
    }

    async function saveProfile(){
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;

      const payload = {
        id: session.user.id,
        username: $("username").value.trim(),
        display_name: $("display_name").value.trim(),
        bio: $("bio").value.trim(),
        updated_at: new Date()
      };

      const { error } = await sb
        .from("profiles")
        .upsert(payload);

      if (error){
        show("Error guardando perfil: " + error.message, "err");
      } else {
        show("Perfil guardado ✅", "ok");
      }
    }

    loadProfile();
  </script>
</body>
</html>
